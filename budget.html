  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="./index.html">Hong Kong Go Cup</a>

        <a href="./index.html">首頁</a>

        <a href="./sponsorship.html">贊助方案</a>
      </nav>

  </header>

  <main class="container">
    <section class="hero">
      <span class="tag">Budget Plan</span>
      <h1>開支計劃表（HKD 100,000）</h1>
      <p>以下為 3 月中小型圍棋賽建議配置，可按場地實價上下調整。</p>
    </section>

    <section class="card" style="margin-top:14px">
      <div class="table-wrap">
        <table>
          <thead><tr><th>類別</th><th class="right">預算（HKD）</th><th>說明</th></tr></thead>
          <tbody>
            <tr><td>場地</td><td class="right">24,000</td><td>會堂/禮堂 1.5 日 + 管理清潔</td></tr>
            <tr><td>物流與器材</td><td class="right">12,000</td><td>棋盤棋子、計時鐘、搬運</td></tr>
            <tr><td>工作人員</td><td class="right">16,000</td><td>裁判、賽務、場務、攝影</td></tr>
            <tr><td>獎項與比賽金</td><td class="right">18,000</td><td>獎金、獎盃、證書</td></tr>
            <tr><td>宣傳</td><td class="right">10,000</td><td>社媒推廣、海報、報名系統</td></tr>
            <tr><td>保險與行政</td><td class="right">6,000</td><td>公眾責任保險及行政雜費</td></tr>
            <tr><td>餐飲與補給</td><td class="right">6,000</td><td>工作人員餐飲、飲用水</td></tr>
            <tr><td>預備金</td><td class="right">8,000</td><td>突發費用</td></tr>
          </tbody>
          <tfoot><tr><th>總計</th><th class="right">100,000</th><th></th></tr></tfoot>
        </table>
      </div>
    </section>
  </main>
